name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  native:
    name: Native MoonBit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Check formatting
        run: moon fmt --check

      - name: Verify generated interfaces
        run: |
          moon info
          git diff --exit-code -- pkg.generated.mbti cmd/main/pkg.generated.mbti

      - name: Check native package
        run: moon check --target native --warn-list +73

      - name: Run native tests
        run: moon test --target native

  sanitizer:
    name: ASAN/UBSAN smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Set up MoonBit headers
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Run sanitizer smoke test
        run: scripts/asan-smoke.sh
